mode: full
input_csv: data/input_inspicio.csv
output_jsonl: outputs/output_mistral_openai.jsonl
report_file: outputs/evaluation_mistral_openai.txt
resume: true
default_pos: verb

columns:
  pos: PoS
  ground_truth: VERB SEMANTICS

llm:
  provider: mistral
  model: mistral-medium-3.5
  api_key_env: MISTRAL_API_KEY
  extra_params:
    reasoning_effort: high

embedder:
  provider: openai
  model: text-embedding-3-large
  api_key_env: OPENAI_API_KEY

index:
  pos: all
  chroma_path_template: ./oewn_{pos_name}_embeddings
  collection_template: oewn_{pos_plural}

generation:
  translation_enabled: true

retrieval:
  top_k: 50
  enable_mmr: true
  enable_lexname_coverage: false
